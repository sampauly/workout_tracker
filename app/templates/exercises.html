{% extends "base.html" %}
{% block title %}Exercises — Workout Tracker{% endblock %}

{% block content %}
<h1 class="mb-1">Exercise Catalog</h1>
<p class="text-muted mb-4">Browse and search available exercises.</p>

<form method="GET" class="row g-2 mb-4">
    <div class="col-sm-4">
        <input type="text" name="muscle_group" class="form-control" placeholder="Muscle group">
    </div>
    <div class="col-sm-4">
        <input type="text" name="equipment" class="form-control" placeholder="Equipment">
    </div>
    <div class="col-sm-4">
        <button type="submit" class="btn btn-primary w-100">Search</button>
    </div>
</form>

<div class="card">
    <div class="card-body p-0">
        <table class="table mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Muscle Group</th>
                    <th>Equipment</th>
                </tr>
            </thead>
            <tbody>
                {% for e in exercises %}
                <tr>
                    <td>{{ e[0] }}</td>
                    <td>{{ e[1] }}</td>
                    <td>{{ e[2] }}</td>
                    <td>{{ e[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
